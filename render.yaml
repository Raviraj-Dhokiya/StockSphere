services:
  - type: web
    name: stocksphere-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: FINNHUB_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: CLIENT_URL
        sync: false          # Set to your Vercel URL manually
